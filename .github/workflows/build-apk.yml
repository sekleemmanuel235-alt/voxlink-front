name: Build Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter (Version de transition)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Create Missing Languages Model
        run: |
          # Crée le dossier des modèles s'il n'existe pas sur le serveur
          mkdir -p lib/models
          
          # Injecte la classe AppLanguages proposée par Claude
          cat << 'INNER_EOF' > lib/models/languages.dart
          class AppLanguages {
            static List<Map<String, String>> get all => [
              {'code': 'fr', 'flag': '🇫🇷', 'label': 'Français'},
              {'code': 'en', 'flag': '🇺🇸', 'label': 'English'},
            ];

            static Map<String, String>? findByCode(String code) {
              try {
                return all.firstWhere((l) => l['code'] == code);
              } catch (_) {
                return null;
              }
            }
          }
          INNER_EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (Force V1 Compatibility)
        run: flutter build apk --release --ignore-deprecation
