name: Build Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct Modern Android Folder
        run: |
          # Supprime l'ancien dossier Android problématique
          rm -rf android
          # Recrée un dossier Android propre et moderne (v2 embedding) adapté à ton projet
          flutter create . --platforms=android

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release
